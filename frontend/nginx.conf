# ============================================================
# Nginx config — sert le SPA Vite + proxy /api/* vers le backend.
# ============================================================
# Ce fichier est copie dans /etc/nginx/conf.d/default.conf par le
# Dockerfile du frontend. Il fait deux choses :
#
#   1. Sert les fichiers statiques compiles par Vite depuis
#      /usr/share/nginx/html (= ce qui sortira de `vite build`).
#
#   2. Reverse-proxy : toute requete vers /api/* est forwardee vers
#      le service `backend` (resolution DNS interne docker-compose)
#      sur son port 8000. Le prefixe /api est strippe avant forward
#      (le backend ne sait rien de ce prefixe — il voit juste /tutor,
#      /quiz, etc.) — c'est le meme comportement que le proxy Vite
#      en dev (cf. vite.config.ts).
#
#   3. SPA fallback : pour toute route cote client (/dashboard,
#      /tutor, /content, ...), on sert index.html. Sans ca, un F5
#      sur /tutor renvoie un 404 nginx au lieu de booter le routeur.
# ============================================================

server {
    listen 80;
    server_name _;

    # Compression gzip pour reduire la bande passante (le bundle JS
    # peut faire plusieurs centaines de Ko, gzip divise par ~3).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Reverse proxy /api/* -> backend:8000/* ----
    # On supprime le prefixe /api avant de forwarder, exactement
    # comme le proxy Vite en dev (rewrite: path.replace(/^\/api/, '')).
    location /api/ {
        # Strip /api du path forwarde au backend.
        rewrite ^/api/(.*)$ /$1 break;

        # backend = nom du service docker-compose -> resolution DNS interne.
        # Le port 8000 est celui sur lequel uvicorn ecoute dans le container.
        proxy_pass http://backend:8000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout long pour les reponses Tuteur IA (Gemma local
        # peut mettre 30-60s a generer une reponse complete).
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ---- Assets statiques avec cache long ----
    # Vite genere des hash dans les noms de fichiers (main-abc123.js),
    # donc on peut cacher 1 an sans risque (le hash change si le fichier change).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Proxy /static/* -> backend:8000/static/* ----
    # Les videos Manim pre-rendues sont stockees cote backend dans
    # /backend/static/animations/*.mp4 et exposees via FastAPI staticfiles
    # mount. Le SPA y accede via <video src="/static/animations/...mp4">.
    # En prod (docker-compose), nginx forwarde ces requetes au backend
    # exactement comme /api, mais SANS strip du prefixe (le backend
    # connait /static).
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache HTTP cote client : les MP4 sont gros et changent rarement.
        # 1 jour de cache navigateur reduit la bande passante en demo.
        expires 1d;
        add_header Cache-Control "public";
    }

    # ---- SPA fallback ----
    # Pour toute route cote client (ex: /dashboard, /tutor) qui ne
    # correspond pas a un fichier physique, on sert index.html. Le
    # routeur TypeScript prendra le relais cote navigateur.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
