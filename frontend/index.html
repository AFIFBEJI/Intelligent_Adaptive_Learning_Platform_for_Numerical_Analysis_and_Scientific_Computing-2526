<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adaptive Learning Platform</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- DOMPurify : protection XSS pour le rendu HTML du tuteur IA (12/05/2026).
         La sortie du LLM peut contenir du HTML/JS si un user jailbreak le prompt.
         On la passe systematiquement dans DOMPurify.sanitize() avant innerHTML.
         Charge en <head> SANS `defer` pour etre dispo avant tout `formatTutorContent`. -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', sans-serif; background: #07111f; color: #f8fafc; min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
