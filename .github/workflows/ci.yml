 # ============================================================
# CI/CD — Adaptive Learning Platform PFE
# ============================================================
# This pipeline is triggered on every push and on every pull request
# targeting the main branch. Its goal is to guarantee that the
# platform always remains in a buildable, lintable, testable and
# seedable state.
#
# Seven jobs run in parallel (or with explicit dependencies) :
#   1. backend-lint            — ruff static analysis on the FastAPI codebase
#   2. backend-smoke           — imports the FastAPI app to catch syntax errors
#   3. frontend-build          — TypeScript type-check + Vite production build
#   4. graph-integrity         — spins up Neo4j 5, runs seed_neo4j.py, then
#                                asserts that the resulting graph has the
#                                expected nodes/relationships (pytest)
#   5. docker-validate         — validates the docker-compose.yml syntax
#   6. backend-integration     — runs FastAPI TestClient integration tests
#                                (auth flow, quiz mode gate, /health, etc.)
#   7. e2e-playwright          — spins up the full stack (Postgres+Neo4j+
#                                backend uvicorn+vite preview) and runs
#                                Playwright E2E tests (smoke, auth, quiz)
# ============================================================

name: CI - Plateforme adaptative

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------
  # 1. Backend — static analysis
  # ------------------------------------------------------------
  backend-lint:
    name: Backend · Ruff lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff
        run: ruff check app tests

  # ------------------------------------------------------------
  # 2. Backend — smoke-import test (catches ImportError, SyntaxError)
  # ------------------------------------------------------------
  backend-smoke:
    name: Backend · Smoke import
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + dev dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Import FastAPI app
        env:
          # The app reads env vars at import-time; provide harmless defaults
          DATABASE_URL: "postgresql+psycopg2://admin:admin@localhost:5432/adaptive_learning"
          NEO4J_URI: "bolt://localhost:7687"
          NEO4J_USER: "neo4j"
          NEO4J_PASSWORD: "test"
          SECRET_KEY: "ci-dummy-secret"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "60"
          GOOGLE_API_KEY: "ci-dummy"
          GEMINI_MODEL: "gemini-2.0-flash"
        run: python -c "import app.main; print('FastAPI app imported OK:', app.main.app.title)"

  # ------------------------------------------------------------
  # 3. Frontend — type-check + Vite production build
  # ------------------------------------------------------------
  frontend-build:
    name: Frontend · tsc + Vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

  # ------------------------------------------------------------
  # 4. Graph integrity — seed Neo4j and assert the V1 scope
  # ------------------------------------------------------------
  graph-integrity:
    name: Graph · Seed + integrity test
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/ci-password-123
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p ci-password-123 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ci-password-123
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          # On installe TOUT requirements.txt et pas seulement neo4j+dotenv,
          # parce que pytest auto-charge tests/conftest.py qui importe
          # fastapi.testclient + sqlalchemy au module level. Sans ces deps,
          # le seed integrity test plante avec un ModuleNotFoundError avant
          # meme d'arriver aux assertions.
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Wait for Neo4j
        run: |
          for i in {1..30}; do
            if nc -z localhost 7687; then
              echo "Neo4j is up"; exit 0
            fi
            echo "Waiting for Neo4j... ($i/30)"
            sleep 2
          done
          echo "Neo4j did not start in time"; exit 1

      - name: Seed the knowledge graph
        run: python scripts/seed_neo4j.py

      - name: Run integrity test
        run: pytest tests/test_seed_integrity.py -v

  # ------------------------------------------------------------
  # 5. Docker Compose — validate the compose file syntax
  # ------------------------------------------------------------
  docker-validate:
    name: Docker · Compose syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker/docker-compose.yml config --quiet

  # ------------------------------------------------------------
  # 6. Backend integration — FastAPI TestClient + SQLite in memory
  # ------------------------------------------------------------
  # Tests les flows complets : auth (register/login/me/hardening),
  # quiz double-mode (mastery update conditionnel), health endpoint.
  # Pas besoin de spinner Postgres / Neo4j : les tests utilisent
  # SQLite en memoire et stub Neo4j (cf. backend/tests/conftest.py).
  # ------------------------------------------------------------
  backend-integration:
    name: Backend · Integration tests (TestClient)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + dev dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run integration tests
        run: pytest tests/test_health_integration.py tests/test_auth_integration.py tests/test_quiz_integration.py tests/test_email_integration.py -v

  # ------------------------------------------------------------
  # 7. E2E Playwright — spin up full stack + run browser tests
  # ------------------------------------------------------------
  # Demarre Postgres + Neo4j en service containers, lance le backend
  # uvicorn natif et le frontend Vite preview, puis tourne les specs
  # Playwright (smoke, auth, quiz). Exigeant en infrastructure mais
  # garantit que les flux utilisateurs critiques marchent end-to-end.
  # ------------------------------------------------------------
  e2e-playwright:
    name: E2E · Playwright (smoke + auth + quiz)
    runs-on: ubuntu-latest
    needs: [backend-smoke, frontend-build]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: ci-pg-password
          POSTGRES_DB: adaptive_learning
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/ci-neo4j-password
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p ci-neo4j-password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg2://admin:ci-pg-password@localhost:5432/adaptive_learning
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ci-neo4j-password
      SECRET_KEY: ci-e2e-secret-key-32-bytes-minimum
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      LLM_PROVIDER: openai
      LLM_MODEL_NAME: gpt-4o-mini
      OPENAI_API_KEY: ci-dummy-key-no-real-call
      LLM_PICKER_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Seed Neo4j with the knowledge graph
        working-directory: backend
        run: python scripts/seed_neo4j.py

      - name: Seed quizzes for E2E
        working-directory: backend
        run: python scripts/seed_quizzes.py || true

      - name: Start backend (uvicorn) in background
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &
          echo "Backend started, waiting for /health..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Backend is up after $i tries"
              exit 0
            fi
            sleep 2
          done
          echo "Backend never came up. Logs:"
          cat /tmp/backend.log
          exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start frontend (Vite preview) in background
        working-directory: frontend
        run: |
          nohup npm run preview > /tmp/frontend.log 2>&1 &
          echo "Frontend starting..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:4200/ > /dev/null; then
              echo "Frontend is up after $i tries"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend never came up. Logs:"
          cat /tmp/frontend.log
          exit 1

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:4200
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload backend logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: /tmp/backend.log
          retention-days: 7
